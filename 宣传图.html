<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招聘信息网 — 宣传图</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #e2e8f0;
    display:flex; justify-content:center; align-items:center; min-height:100vh;
    padding:20px;
  }
  .card {
    width:600px;
    background:#ffffff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.12);
    color:#1a1a2e;
  }
  .card-top {
    padding:36px 32px 24px;
    text-align:center;
  }
  .logo-icon {
    width:72px;height:72px;
    background:linear-gradient(135deg, #eff6ff, #dbeafe);
    border-radius:18px;
    display:inline-flex;
    align-items:center;justify-content:center;
    font-size:36px;
    margin-bottom:16px;
  }
  .card-top h1 {
    font-size:1.8em;font-weight:900;
    letter-spacing:1px;
    margin-bottom:6px;
    background:linear-gradient(135deg, #2563eb, #7c3aed);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .card-top .sub {
    font-size:.95em;
    color:#64748b;
    margin-bottom:4px;
  }
  .card-top .update {
    font-size:.72em;
    color:#94a3b8;
    display:inline-block;
    background:#f1f5f9;
    padding:4px 14px;border-radius:10px;
  }

  /* Stats */
  .stats {
    display:flex;
    justify-content:center;
    gap:0;
    margin:16px 32px;
    background:linear-gradient(135deg, #eff6ff, #f5f3ff);
    border-radius:14px;
    padding:16px 8px;
  }
  .stat {
    flex:1;text-align:center;
    border-right:1px solid #e2e8f0;
    padding:0 8px;
  }
  .stat:last-child { border-right:none; }
  .stat .num {
    font-size:1.6em;font-weight:900;
    background:linear-gradient(135deg, #2563eb, #7c3aed);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .stat .label {
    font-size:.7em;color:#94a3b8;
    margin-top:2px;
  }

  /* Industries */
  .card-body {
    padding:20px 32px 28px;
  }
  .card-body h3 {
    font-size:.85em;color:#94a3b8;
    margin-bottom:10px;
    text-align:center;
    font-weight:500;
  }
  .tags {
    display:flex;flex-wrap:wrap;
    gap:6px;justify-content:center;
  }
  .tags span {
    font-size:.72em;
    padding:5px 12px;
    border-radius:12px;
    background:#f1f5f9;
    border:1px solid #e2e8f0;
    color:#475569;
    white-space:nowrap;
  }
  .tags span.hot {
    background:#fef2f2;
    border-color:#fecaca;
    color:#dc2626;
    font-weight:600;
  }

  /* Bottom */
  .card-bottom {
    background:#f8fafc;
    border-top:1px solid #e2e8f0;
    padding:20px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .card-bottom .url {
    font-size:.85em;font-weight:700;
    letter-spacing:.5px;
    color:#2563eb;
  }
  .card-bottom .cta {
    font-size:.75em;color:#94a3b8;
  }
  .qr-box {
    width:64px;height:64px;
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:10px;
    display:flex;
    align-items:center;justify-content:center;
    font-size:10px;color:#64748b;
    font-weight:700;
    text-align:center;
    line-height:1.3;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <div class="logo-icon">🎯</div>
    <h1>招聘信息网</h1>
    <p class="sub">2027-2029届 实习招聘信息大全</p>
    <span class="update">📅 持续更新 · 企业官网/24365/高校就业网</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="num">1086+</div>
      <div class="label">收录企业</div>
    </div>
    <div class="stat">
      <div class="num">1000+</div>
      <div class="label">招聘条目</div>
    </div>
    <div class="stat">
      <div class="num">15万+</div>
      <div class="label">实习岗位</div>
    </div>
    <div class="stat">
      <div class="num">50%+</div>
      <div class="label">转正率</div>
    </div>
  </div>

  <div class="card-body">
    <h3>覆盖 23 大热门行业</h3>
    <div class="tags">
      <span>💻 计算机/软件</span>
      <span>🤖 AI/算法/大模型</span>
      <span>🔧 硬件/芯片/电子</span>
      <span class="hot">💰 金融/银行/证券</span>
      <span>🚗 汽车/自动驾驶</span>
      <span>🔋 新能源/电池</span>
      <span class="hot">🏥 医药/医疗/生物</span>
      <span>📱 通信/5G/6G</span>
      <span>🎮 游戏/娱乐</span>
      <span>🛒 电商/物流</span>
      <span>✈️ 航空/航天</span>
      <span>🎓 教育/培训</span>
      <span>👔 咨询/法律</span>
      <span>🏭 制造/机械</span>
      <span>🤖 机器人</span>
      <span>☁️ 云计算</span>
    </div>
  </div>

  <div class="card-bottom">
    <div>
      <div class="url">🌐 zhenningyu.top</div>
      <div class="cta" style="margin-top:4px;">新用户注册即享3天免费试用</div>
    </div>
    <div class="qr-box">
      扫码<br>查看
    </div>
  </div>
</div>

</body>
</html>
