<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%27-40 -40 180 180%27><circle cx=%2750%27 cy=%2750%27 r=%2780%27 fill=%27%232563eb%27/><circle cx=%2750%27 cy=%2750%27 r=%2760%27 fill=%27%23eff6ff%27/><circle cx=%2750%27 cy=%2750%27 r=%2740%27 fill=%27%232563eb%27/><circle cx=%2750%27 cy=%2750%27 r=%2720%27 fill=%27%23eff6ff%27/><circle cx=%2750%27 cy=%2750%27 r=%278%27 fill=%27%23ef4444%27/></svg>">
<title>注册 — 招聘信息网</title>
<link rel="stylesheet" href="/auth/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="招聘信息">
<meta name="theme-color" content="#2563eb">
<!-- WeChat -->
<meta itemprop="name" content="🎯 2027-2029届实习招聘信息大全">
<meta itemprop="description" content="覆盖23大行业1000+企业暑期实习，含完整投递链接。新用户3天免费试用。">
<meta itemprop="image" content="https://zhenningyu.top/og-image.png">
<style>
  .code-row { display:flex; gap:10px; align-items:flex-end; }
  .code-row input { flex:1; }
  .code-row button { flex-shrink:0; white-space:nowrap; padding:10px 16px; font-size:.88em; }
  .btn-code { background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; transition:opacity .2s; }
  .btn-code:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-code.counting { background:#94a3b8; }
  .helper { font-size:.75em; color:var(--text2); margin-top:4px; }
  .step-title { font-size:.9em; color:var(--text2); margin-bottom:16px; padding:8px 12px; background:#f0f4ff; border-radius:6px; }
  .step-title span { color:var(--accent); font-weight:700; }
</style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">🎯 招聘信息网</a>
  <div class="nav-links">
    <a href="/auth/login.html">已有账号？登录</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>📝 注册账号</h2>
    <p class="sub">注册即享<strong>3天免费试用</strong>，查看全部招聘信息</p>

    <div id="errorBox" class="error-msg" style="display:none;"></div>
    <div id="successBox" class="success-msg" style="display:none;"></div>

    <form id="registerForm">
      <div class="step-title">📧 <span>第1步</span>：验证邮箱</div>
      <div class="form-group">
        <label>📧 邮箱地址</label>
        <div class="code-row">
          <input type="email" id="email" placeholder="your@email.com" required autofocus>
          <button type="button" id="sendCodeBtn" class="btn-code">发送验证码</button>
        </div>
        <p class="helper">用于登录，同一邮箱只能注册一次</p>
      </div>

      <div class="form-group">
        <label>🔐 邮箱验证码</label>
        <input type="text" id="verifyCode" placeholder="请输入6位验证码" required maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        <p class="helper">验证码已发送到你的邮箱，10分钟内有效</p>
      </div>

      <div class="step-title" style="margin-top:20px;">🔒 <span>第2步</span>：设置密码</div>
      <div class="form-group">
        <label>🔒 密码</label>
        <input type="password" id="password" placeholder="至少8个字符，需含大小写字母+数字" required minlength="8">
        <p class="helper">密码要求：至少8位，包含大写字母、小写字母和数字</p>
      </div>
      <div class="form-group">
        <label>🔒 确认密码</label>
        <input type="password" id="confirmPassword" placeholder="再次输入密码" required minlength="8">
      </div>

      <button type="submit" class="btn-full primary" id="submitBtn">注册</button>
    </form>

    <p class="alt-link">已有账号？<a href="/auth/login.html">立即登录</a></p>
    <p class="alt-link" style="font-size:.75em;color:var(--text2);margin-top:8px;">
      注册即表示同意<a href="#">服务条款</a>。试用期72小时，过期后需订阅（¥9.90/3个月）。
    </p>
  </div>
</div>

<script type="module">
import { api } from '/auth/js/api.js';

const form = document.getElementById('registerForm');
const errorBox = document.getElementById('errorBox');
const successBox = document.getElementById('successBox');
const submitBtn = document.getElementById('submitBtn');
const sendCodeBtn = document.getElementById('sendCodeBtn');
const emailInput = document.getElementById('email');
const codeInput = document.getElementById('verifyCode');

// Handle send code button
let countdown = 0;
let countdownTimer = null;

sendCodeBtn.addEventListener('click', async () => {
  const email = emailInput.value.trim();
  if (!email) {
    showError('请先输入邮箱地址');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showError('请输入有效的邮箱地址');
    return;
  }

  sendCodeBtn.disabled = true;
  sendCodeBtn.textContent = '发送中...';
  errorBox.style.display = 'none';

  const result = await api.sendVerificationCode(email);

  if (result.success) {
    var code = result.data && result.data.code;
    successBox.innerHTML = '验证码：<span style=\"font-size:1.6em;font-weight:700;color:#2563eb;letter-spacing:4px;\">' + (code || '已发送') + '</span><br>有效期10分钟，请勿刷新页面';
    successBox.style.display = 'block';
    codeInput.focus();
    // Start 60s countdown
    countdown = 60;
    sendCodeBtn.classList.add('counting');
    updateCountdown();
    countdownTimer = setInterval(updateCountdown, 1000);
  } else {
    showError(result.message);
    sendCodeBtn.disabled = false;
    sendCodeBtn.textContent = '发送验证码';
  }
});

function updateCountdown() {
  if (countdown <= 0) {
    clearInterval(countdownTimer);
    sendCodeBtn.disabled = false;
    sendCodeBtn.textContent = '重新发送';
    sendCodeBtn.classList.remove('counting');
    return;
  }
  sendCodeBtn.textContent = countdown + 's后重发';
  countdown--;
}

// Handle registration
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = emailInput.value.trim();
  const code = codeInput.value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  errorBox.style.display = 'none';
  successBox.style.display = 'none';

  if (!email || !code || !password || !confirmPassword) {
    showError('请填写所有字段');
    return;
  }

  if (code.length !== 6 || !/^\d{6}$/.test(code)) {
    showError('请输入6位数字验证码');
    return;
  }

  if (password.length < 8) {
    showError('密码至少需要8个字符');
    return;
  }

  if (password !== confirmPassword) {
    showError('两次输入的密码不一致');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '注册中...';

  const result = await api.register(email, password, code);

  if (result.success) {
    successBox.textContent = result.message + ' 正在跳转...';
    successBox.style.display = 'block';
    form.style.display = 'none';
    setTimeout(function(){ window.location.href = '/auth/dashboard'; }, 1500);
  } else {
    showError(result.message);
    submitBtn.disabled = false;
    submitBtn.textContent = '注册';
  }
});

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  successBox.style.display = 'none';
}
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js")</script>
</body>
</html>
