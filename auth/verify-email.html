<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%27-40 -40 180 180%27><circle cx=%2750%27 cy=%2750%27 r=%2780%27 fill=%27%232563eb%27/><circle cx=%2750%27 cy=%2750%27 r=%2760%27 fill=%27%23eff6ff%27/><circle cx=%2750%27 cy=%2750%27 r=%2740%27 fill=%27%232563eb%27/><circle cx=%2750%27 cy=%2750%27 r=%2720%27 fill=%27%23eff6ff%27/><circle cx=%2750%27 cy=%2750%27 r=%278%27 fill=%27%23ef4444%27/></svg>">
<title>验证邮箱 — 招聘信息网</title>
<link rel="stylesheet" href="/auth/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="招聘信息">
<meta name="theme-color" content="#2563eb">
<!-- WeChat -->
<meta itemprop="name" content="🎯 2027-2029届实习招聘信息大全">
<meta itemprop="description" content="覆盖23大行业1000+企业暑期实习，含完整投递链接。新用户3天免费试用。">
<meta itemprop="image" content="https://zhenningyu.top/og-image.png">
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">🎯 招聘信息网</a>
  <div class="nav-links"></div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>📧 验证邮箱</h2>
    <div id="statusBox">
      <div class="loading"><div class="loading-spinner"></div><p>正在验证...</p></div>
    </div>
  </div>
</div>

<script type="module">
import { api } from '/auth/js/api.js';

const statusBox = document.getElementById('statusBox');

async function verify() {
  // Get token from URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (!token) {
    statusBox.innerHTML = `
      <div class="error-msg">
        ❌ 验证链接无效。请检查邮件中的链接是否完整。<br>
        <a href="/auth/register.html" class="btn-full primary" style="display:inline-block;margin-top:12px;text-decoration:none;">重新注册</a>
      </div>
    `;
    return;
  }

  const result = await api.verifyEmail(token);

	  if (result.success) {
	    if (result.data && result.data.token) {
	      statusBox.innerHTML = '<div class="success-msg">✅ ' + result.message + '<br><br>认证成功！正在跳转到登录页...</div>';
	      setTimeout(function(){ window.location.href = '/auth/login'; }, 2000);
	    } else {
	      statusBox.innerHTML = '<div class="success-msg">✅ ' + result.message + '<br><br>正在跳转到登录页...</div>';
	      setTimeout(function(){ window.location.href = '/auth/login'; }, 2000);
	    }
	  } else {
}

verify();
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js")</script>
</body>
</html>
