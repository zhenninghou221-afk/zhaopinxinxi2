<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%27-40 -40 180 180%27><circle cx=%2750%27 cy=%2750%27 r=%2780%27 fill=%27%232563eb%27/><circle cx=%2750%27 cy=%2750%27 r=%2760%27 fill=%27%23eff6ff%27/><circle cx=%2750%27 cy=%2750%27 r=%2740%27 fill=%27%232563eb%27/><circle cx=%2750%27 cy=%2750%27 r=%2720%27 fill=%27%23eff6ff%27/><circle cx=%2750%27 cy=%2750%27 r=%278%27 fill=%27%23ef4444%27/></svg>">
<title>完整招聘信息 — 招聘信息网</title>
<link rel="stylesheet" href="/auth/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="招聘信息">
<meta name="theme-color" content="#2563eb">
<!-- WeChat -->
<meta itemprop="name" content="🎯 2027-2029届实习招聘信息大全">
<meta itemprop="description" content="覆盖23大行业1000+企业暑期实习，含完整投递链接。新用户3天免费试用。">
<meta itemprop="image" content="https://zhenningyu.top/og-image.png">
<style>
  .tab-bar { display:flex; gap:0; margin-bottom:16px; border-bottom:2px solid var(--border); }
  .tab-btn { padding:10px 24px; border:none; background:none; font-size:.9em; font-weight:600; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .18s; }
  .tab-btn:hover { color:var(--accent); }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }
  .fav-count { font-size:.75em; background:var(--accent); color:#fff; border-radius:10px; padding:2px 8px; margin-left:4px; }
</style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">🎯 招聘信息网</a>
  <div class="nav-links">
    <a href="/auth/dashboard">📋 完整信息</a>
    <a href="/auth/payment">💳 订阅管理</a>
    <a href="/" id="logoutLink">退出</a>
  </div>
</nav>

<div class="hero">
  <h1>🎯 完整招聘信息</h1>
  <p class="subtitle">全部1000+条 · 包含完整岗位信息和投递链接 · <span id="dashUpdated"></span></p>
</div>

<div class="container">
  <div id="subBanner"></div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="search">🔍 招聘信息</button>
    <button class="tab-btn" data-tab="favs">⭐ 我的收藏 <span class="fav-count" id="favCount" style="display:none;">0</span></button>
  </div>

  <!-- Tab 1: Search & Data -->
  <div class="tab-panel active" id="panelSearch">
    <div class="search-bar-wrap">
      <div class="search-input-row">
        <input type="text" id="searchInput" placeholder="🔍 搜索企业、城市、岗位、行业…" autofocus>
        <span class="search-result-count" id="resultCount">加载中...</span>
      </div>
      <div class="search-chips" id="searchChips">
        <div class="search-chips-row" id="locationChipsRow">
          <span class="search-chip-cat">📍 地区</span>
        </div>
        <div class="search-chips-row" id="jobChipsRow">
          <span class="search-chip-cat">💼 岗位</span>
        </div>
        <div class="search-chips-row" id="subJobChipsRow" style="display:none;">
          <span class="search-chip-cat">🔍 细分方向</span>
        </div>
      </div>
      <div class="search-summary" id="searchSummary" style="display:none;">
        当前筛选：<span id="filterSummary"></span>
        <span class="clear-link">清除全部</span>
      </div>
    </div>

    <div class="rows">
      <div class="row header-row">
        <span class="row-num">#</span>
        <span class="row-left">企业 / 工作地区</span>
        <span class="row-info">面向对象 / 岗位方向</span>
        <span class="row-actions">投递</span>
      </div>
      <div id="dataRows">
        <div class="loading"><div class="loading-spinner"></div><p>加载中...</p></div>
      </div>
    </div>
  </div>

  <!-- Tab 2: Favorites -->
  <div class="tab-panel" id="panelFavs">
    <div id="favoritesList">
      <div class="loading"><div class="loading-spinner"></div><p>加载中...</p></div>
    </div>
  </div>

  <div class="footer">
    <p>📅 订阅有效期内可查看全部完整信息</p>
  </div>
</div>

<script>
// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel' + (btn.dataset.tab === 'search' ? 'Search' : 'Favs')).classList.add('active');
  });
});
</script>

<script type="module">
import { api } from '/auth/js/api.js';
</script>
<script type="module" src="/auth/js/app.js"></script>
<script>
document.getElementById('logoutLink').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.removeItem('recruitment_token');
  localStorage.removeItem('recruitment_user');
  window.location.href = '/';
});
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js")</script>
</body>
</html>
