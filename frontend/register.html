<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 — 招聘信息网</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/index.html" class="logo">🎯 招聘信息网</a>
  <div class="nav-links">
    <a href="/login.html">已有账号？登录</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>📝 注册账号</h2>
    <p class="sub">注册即享<strong>1天免费试用</strong>，查看全部招聘信息</p>

    <div id="errorBox" class="error-msg" style="display:none;"></div>
    <div id="successBox" class="success-msg" style="display:none;"></div>

    <form id="registerForm">
      <div class="form-group">
        <label>📧 邮箱地址</label>
        <input type="email" id="email" placeholder="your@email.com" required autofocus>
        <p class="helper">用于登录和接收验证邮件</p>
      </div>
      <div class="form-group">
        <label>🔒 密码</label>
        <input type="password" id="password" placeholder="至少8个字符" required minlength="8">
      </div>
      <div class="form-group">
        <label>🔒 确认密码</label>
        <input type="password" id="confirmPassword" placeholder="再次输入密码" required minlength="8">
      </div>
      <button type="submit" class="btn-full primary" id="submitBtn">注册</button>
    </form>

    <p class="alt-link">已有账号？<a href="/login.html">立即登录</a></p>
    <p class="alt-link" style="font-size:.75em;color:var(--text2);margin-top:8px;">
      注册即表示同意<a href="#">服务条款</a>。试用期24小时，过期后需订阅（¥9.90/3个月）。
    </p>
  </div>
</div>

<script type="module">
import { api } from '/js/api.js';

const form = document.getElementById('registerForm');
const errorBox = document.getElementById('errorBox');
const successBox = document.getElementById('successBox');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  errorBox.style.display = 'none';
  successBox.style.display = 'none';

  if (!email || !password || !confirmPassword) {
    showError('请填写所有字段');
    return;
  }

  if (password.length < 8) {
    showError('密码至少需要8个字符');
    return;
  }

  if (password !== confirmPassword) {
    showError('两次输入的密码不一致');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '注册中...';

  const result = await api.register(email, password);

  if (result.success) {
    successBox.textContent = result.message;
    successBox.style.display = 'block';
    form.style.display = 'none';
    document.querySelector('.alt-link').style.display = 'none';
  } else {
    showError(result.message);
    submitBtn.disabled = false;
    submitBtn.textContent = '注册';
  }
});

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}
</script>
</body>
</html>
