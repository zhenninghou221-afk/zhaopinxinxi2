<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 招聘信息网</title>
<link rel="stylesheet" href="/登陆注册/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">🎯 招聘信息网</a>
  <div class="nav-links">
    <a href="/登陆注册/register.html" class="btn-nav">免费注册</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>👋 欢迎回来</h2>
    <p class="sub">登录查看完整招聘信息</p>

    <div id="errorBox" class="error-msg" style="display:none;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>📧 邮箱地址</label>
        <input type="email" id="email" placeholder="your@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label>🔒 密码</label>
        <input type="password" id="password" placeholder="输入密码" required>
      </div>
      <button type="submit" class="btn-full primary" id="submitBtn">登录</button>
    </form>

    <p class="alt-link">还没有账号？<a href="/登陆注册/register.html">免费注册（享1天试用）</a></p>
  </div>
</div>

<script type="module">
import { api } from '/js/api.js';

const form = document.getElementById('loginForm');
const errorBox = document.getElementById('errorBox');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  errorBox.style.display = 'none';

  if (!email || !password) {
    showError('请填写邮箱和密码');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '登录中...';

  const result = await api.login(email, password);

  if (result.success) {
    window.location.href = '/dashboard.html';
  } else {
    showError(result.message);
    submitBtn.disabled = false;
    submitBtn.textContent = '登录';
  }
});

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}
</script>
</body>
</html>
