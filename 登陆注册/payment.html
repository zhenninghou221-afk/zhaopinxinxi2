<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订阅管理 — 招聘信息网</title>
<link rel="stylesheet" href="/登陆注册/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">🎯 招聘信息网</a>
  <div class="nav-links">
    <a href="/登陆注册/dashboard.html">📋 完整信息</a>
    <a href="/登陆注册/payment.html">💳 订阅管理</a>
    <a href="/" id="logoutLink">退出</a>
  </div>
</nav>

<div class="container">
  <!-- Banner -->
  <div id="subBanner" style="margin-top:12px;"></div>

  <!-- Subscription Status -->
  <div class="payment-section" id="subscriptionStatus">
    <div class="loading"><div class="loading-spinner"></div><p>加载中...</p></div>
  </div>

  <!-- Purchase Section -->
  <div class="payment-section" id="purchaseSection" style="display:none;">
    <h3>💳 订阅招聘信息网</h3>
    <div class="price-tag">
      <span class="unit">¥</span><span class="amount">9.90</span>
      <div class="period">/ 3个月</div>
    </div>
    <p style="text-align:center;color:var(--text2);">可叠加购买，每次延长3个月有效期</p>

    <button class="btn-full primary" id="createOrderBtn" style="margin-top:16px;">立即购买 — ¥9.90</button>
  </div>

  <!-- QR Code + Upload Section -->
  <div class="payment-section" id="paymentSection" style="display:none;">
    <h3>📱 扫码支付</h3>
    <p style="text-align:center;color:var(--text2);" id="orderInfo"></p>

    <div class="qr-section">
      <div class="qr-card alipay">
        <img src="/登陆注册/images/alipay_qr.png" alt="支付宝收款码" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22><rect fill=%22%231677ff%22 width=%22150%22 height=%22150%22/><text fill=%22white%22 x=%2275%22 y=%2275%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>支付宝收款码</text></svg>'">
        <div class="label">支付宝</div>
      </div>
      <div class="qr-card wechat">
        <img src="/登陆注册/images/wechat_qr.png" alt="微信收款码" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22><rect fill=%22%2307c160%22 width=%22150%22 height=%22150%22/><text fill=%22white%22 x=%2275%22 y=%2275%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>微信收款码</text></svg>'">
        <div class="label">微信支付</div>
      </div>
    </div>

    <div class="alert tips" style="margin:16px 0;">
      <strong>📌 支付说明：</strong><br>
      ① 扫描上方二维码支付 ¥9.90<br>
      ② <strong>务必在转账备注中填写订单号</strong><br>
      ③ 截图保存支付成功页面<br>
      ④ 点击下方按钮上传截图
    </div>

    <div class="upload-section">
      <p style="margin-bottom:12px;">📎 上传付款截图</p>
      <label class="upload-label" for="proofFile">选择截图文件</label>
      <input type="file" id="proofFile" accept="image/jpeg,image/png,image/webp,image/gif">
      <p style="font-size:.76em;color:var(--text2);margin-top:8px;" id="uploadStatus"></p>
    </div>
  </div>

  <!-- Payment History -->
  <div class="payment-section" id="paymentHistorySection">
    <h3>📋 支付记录</h3>
    <div id="paymentHistory">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>
  </div>
</div>

<script>
document.getElementById('logoutLink').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.removeItem('recruitment_token');
  localStorage.removeItem('recruitment_user');
  window.location.href = '/index.html';
});
</script>
<script type="module">
import { api } from '/js/api.js';

let currentOrderId = null;

// Load page
async function initPaymentPage() {
  // Check login
  if (!api.isLoggedIn()) {
    window.location.href = '/login.html';
    return;
  }

  // Get subscription status
  const subResult = await api.getSubscriptionStatus();
  if (subResult.success) {
    const sub = subResult.data;
    const statusEl = document.getElementById('subscriptionStatus');
    const purchaseSection = document.getElementById('purchaseSection');

    if (sub.hasAccess) {
      statusEl.innerHTML = `
        <div class="banner ${sub.status === 'trial' ? 'trial' : 'active'}">
          ${sub.status === 'trial' ? '🎁 免费试用中' : '✅ 已订阅'} · ${sub.remaining}
        </div>
        <p style="text-align:center;color:var(--text2);">订阅到期后可继续购买延长。每次购买延长90天，可叠加。</p>
      `;
    } else {
      statusEl.innerHTML = `
        <div class="banner expired">${sub.message}</div>
      `;
    }

    if (purchaseSection) purchaseSection.style.display = 'block';
  }

  // Load payment history
  const ordersResult = await api.getPaymentOrders();
  if (ordersResult.success) {
    renderPaymentHistory(ordersResult.data.orders);
  }
}

// Create order
document.getElementById('createOrderBtn').addEventListener('click', async () => {
  const btn = document.getElementById('createOrderBtn');
  btn.disabled = true;
  btn.textContent = '创建订单中...';

  const result = await api.createOrder();
  if (result.success) {
    currentOrderId = result.data.orderId;
    document.getElementById('orderInfo').textContent =
      `订单号：${result.data.orderId} | 金额：¥${result.data.amount.toFixed(2)}`;
    document.getElementById('paymentSection').style.display = 'block';
    btn.textContent = '重新购买';
    btn.disabled = false;
  } else {
    alert(result.message);
    btn.disabled = false;
    btn.textContent = '立即购买 — ¥9.90';
  }
});

// Upload proof
document.getElementById('proofFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  if (!currentOrderId) {
    alert('请先创建订单');
    return;
  }

  const statusEl = document.getElementById('uploadStatus');
  statusEl.textContent = '上传中...';

  const result = await api.uploadProof(currentOrderId, file);
  if (result.success) {
    statusEl.textContent = '✅ ' + result.message;
    // Reload orders
    const ordersResult = await api.getPaymentOrders();
    if (ordersResult.success) {
      renderPaymentHistory(ordersResult.data.orders);
    }
  } else {
    statusEl.textContent = '❌ ' + result.message;
  }
});

function renderPaymentHistory(orders) {
  const el = document.getElementById('paymentHistory');
  if (!orders || orders.length === 0) {
    el.innerHTML = '<p style="text-align:center;color:var(--text2);">暂无支付记录</p>';
    return;
  }

  el.innerHTML = `
    <table>
      <thead><tr><th>订单号</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
      <tbody>
        ${orders.map(o => `
          <tr>
            <td style="font-size:.75em;">${o.order_id}</td>
            <td>¥${o.amount.toFixed(2)}</td>
            <td><span class="status-badge ${o.status}">${statusLabel(o.status)}</span></td>
            <td style="font-size:.75em;">${o.created_at ? o.created_at.slice(0, 16) : ''}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function statusLabel(s) {
  const labels = { pending: '待支付', pending_verify: '审核中', completed: '已完成', cancelled: '已取消', expired: '已过期' };
  return labels[s] || s;
}

initPaymentPage();
</script>
</body>
</html>
